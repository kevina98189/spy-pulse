name: Fetch SPY Close Price

on:
  schedule:
    # Runs at 4:30pm ET (21:30 UTC) every weekday Mon-Fri
    - cron: '30 21 * * 1-5'
  workflow_dispatch:

jobs:
  fetch-spy-close:
    runs-on: ubuntu-latest

    steps:
      - name: Fetch SPY close and create daily snapshot
        env:
          ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python3 << 'EOF'
          import urllib.request
          import json
          import os
          import sys
          from datetime import datetime, timezone, timedelta

          ALPHA_KEY = os.environ['ALPHA_VANTAGE_KEY']
          SB_URL    = os.environ['SUPABASE_URL']
          SB_KEY    = os.environ['SUPABASE_SERVICE_KEY']

          et = datetime.now(timezone(timedelta(hours=-4)))
          today = et.strftime('%Y-%m-%d')
          print(f"Processing {today}")

          headers = {
            'Content-Type':  'application/json',
            'apikey':        SB_KEY,
            'Authorization': f'Bearer {SB_KEY}'
          }

          def sb_post(path, payload, prefer=None):
            h = dict(headers)
            if prefer: h['Prefer'] = prefer
            req = urllib.request.Request(
              f"{SB_URL}/rest/v1/{path}",
              data=json.dumps(payload).encode('utf-8'),
              headers=h, method='POST'
            )
            try:
              with urllib.request.urlopen(req) as r:
                print(f"  POST {path}: {r.status}")
                return True
            except urllib.error.HTTPError as e:
              print(f"  POST {path} error: {e.code} {e.read().decode()}")
              return False

          def sb_get(path):
            req = urllib.request.Request(f"{SB_URL}/rest/v1/{path}", headers=headers)
            with urllib.request.urlopen(req) as r:
              return json.loads(r.read().decode())

          # Step 1: Snapshot 4am-4pm ET votes
          print("Creating daily snapshot...")
          window_start = f"{today}T04:00:00-04:00"
          window_end   = f"{today}T16:00:00-04:00"
          votes = sb_get(f"votes?select=direction&voted_at=gte.{window_start}&voted_at=lte.{window_end}")
          bull = sum(1 for v in votes if v['direction'] == 'bull')
          bear = sum(1 for v in votes if v['direction'] == 'bear')
          print(f"  bull={bull} bear={bear} total={bull+bear}")
          sb_post('daily_snapshots',
            {'snapshot_date': today, 'bull_count': bull, 'bear_count': bear},
            'resolution=merge-duplicates')

          # Step 2: Fetch SPY close
          print("Fetching SPY price...")
          url = (f"https://www.alphavantage.co/query"
                 f"?function=TIME_SERIES_DAILY&symbol=SPY"
                 f"&outputsize=compact&apikey={ALPHA_KEY}")
          req = urllib.request.Request(url)
          with urllib.request.urlopen(req) as resp:
            data = json.loads(resp.read().decode())

          ts = data.get('Time Series (Daily)', {})
          if not ts:
            print("ERROR: No data"); print(json.dumps(data)); sys.exit(1)

          sorted_dates = sorted(ts.keys())
          latest_date  = sorted_dates[-1]
          prev_date    = sorted_dates[-2]
          open_price   = float(ts[latest_date]['1. open'])
          close_price  = float(ts[latest_date]['4. close'])
          prev_close   = float(ts[prev_date]['4. close'])
          pct_change   = round((close_price - prev_close) / prev_close * 100, 4)
          result_dir   = 'bull' if pct_change > 0.3 else ('bear' if pct_change < -0.3 else 'flat')

          print(f"  {latest_date}: {prev_close} → {close_price} ({pct_change:+.4f}% {result_dir})")

          sb_post('spy_closes', {
            'close_date': latest_date, 'open_price': open_price,
            'close_price': close_price, 'pct_change': pct_change,
            'result_direction': result_dir
          }, 'resolution=merge-duplicates')

          print("Done!")
          EOF
